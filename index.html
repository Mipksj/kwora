<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Kwora</title>
<meta name="theme-color" content="#0C0D11" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800&family=Onest:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{
  --bg:#0C0D11; --s1:#14161C; --s2:#1B1E27; --s3:#242833; --line:#282C38;
  --tx:#EDEFF4; --dim:#8A90A0;
  --b1:#7B61FF; --b2:#3EA8FF; --grad:linear-gradient(135deg,#7B61FF,#3EA8FF);
  --ok:#34D399; --bad:#FF5C6C; --gold:#F5B441;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);color:var(--tx);
  font-family:Onest,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;overflow:hidden;
}
body::before,body::after{
  content:"";position:fixed;z-index:0;pointer-events:none;
  width:70vmax;height:70vmax;border-radius:50%;filter:blur(90px);opacity:.15;
}
body::before{background:#7B61FF;top:-32vmax;left:-26vmax}
body::after{background:#3EA8FF;bottom:-36vmax;right:-26vmax}

*{scrollbar-width:thin;scrollbar-color:#2E3340 transparent}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2E3340;border-radius:9px;border:3px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:#3D4353;background-clip:padding-box}

button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea{font:inherit;color:inherit;background:none;border:none;width:100%}
:focus{outline:none}
button:focus-visible{outline:2px solid var(--b2);outline-offset:2px}
input::placeholder,textarea::placeholder{color:var(--dim);opacity:1}
img{display:block;max-width:100%}
.mono{font-family:"JetBrains Mono",ui-monospace,monospace}
.hide{display:none !important}
.grow{flex:1;min-width:0}
.ell{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.frame{
  position:relative;z-index:1;height:100vh;height:100dvh;
  max-width:500px;margin:0 auto;display:flex;flex-direction:column;overflow:hidden;
  background:rgba(12,13,17,.72);backdrop-filter:blur(18px);
  border-left:1px solid var(--line);border-right:1px solid var(--line);
}
@media(max-width:520px){.frame{border:none}}
@media(min-width:900px){.frame{max-width:1240px}}

#auth,#gate{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;justify-content:center;padding:26px}
#app{position:relative;flex:1;min-height:0;display:flex;overflow:hidden}
.left{display:flex;flex-direction:column;flex:1;min-width:0;min-height:0;overflow:hidden}
@media(min-width:900px){
  #app{display:grid;grid-template-columns:370px 1fr;grid-template-rows:minmax(0,1fr)}
  .left{border-right:1px solid var(--line)}
}

.logo{
  font-family:Unbounded,sans-serif;font-weight:800;
  font-size:clamp(40px,12vw,54px);letter-spacing:-.03em;text-align:center;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;
}
.pane{background:var(--s1);border:1px solid var(--line);border-radius:26px;padding:20px;margin:28px auto 0;width:100%;max-width:400px}
.pane h3{font-size:18px;margin-bottom:4px;text-align:center}
.pane .sub{font-size:13px;color:var(--dim);text-align:center;margin-bottom:18px}
.seg{display:flex;gap:4px;background:var(--bg);border-radius:14px;padding:4px;margin-bottom:16px}
.seg button{flex:1;padding:10px;border-radius:11px;font-weight:600;font-size:14px;color:var(--dim)}
.seg button.on{background:var(--s2);color:var(--tx)}
.inp{
  display:flex;align-items:center;gap:8px;background:var(--s2);
  border:1px solid transparent;border-radius:14px;padding:13px 15px;margin-bottom:10px;
  transition:border-color .15s;
}
.inp:focus-within{border-color:var(--b1)}
.inp .pre{color:var(--dim);font-family:"JetBrains Mono",monospace}
.eye{width:26px;height:26px;flex:none;display:grid;place-items:center;color:var(--dim)}
.eye:hover{color:var(--tx)}
.codein input{
  text-align:center;letter-spacing:.42em;font-size:23px;font-weight:600;
  font-family:"JetBrains Mono",monospace;padding:4px 0 4px 12px;
}
.cta{
  width:100%;background:var(--grad);color:#fff;font-weight:600;border-radius:14px;padding:15px;margin-top:6px;
  box-shadow:0 6px 20px -8px rgba(123,97,255,.8);transition:transform .12s,opacity .12s;
}
.cta:active{transform:scale(.985)}
.cta[disabled]{opacity:.5;box-shadow:none}
.ghost{width:100%;background:var(--s2);border:1px solid var(--line);border-radius:14px;padding:13px;font-weight:600}
.ghost:hover{background:var(--s3)}
.ghost[disabled]{opacity:.45}
.plain{width:100%;padding:11px;color:var(--dim);font-size:14px;font-weight:500;margin-top:6px}
.plain:hover{color:var(--tx)}
.danger{color:var(--bad)}
.note{font-size:13px;color:var(--bad);min-height:18px;margin-top:10px;text-align:center}

.head{
  display:flex;align-items:center;gap:9px;padding:13px 15px;
  padding-top:calc(13px + env(safe-area-inset-top));
  border-bottom:1px solid var(--line);flex:none;
}
.head .name{font-family:Unbounded,sans-serif;font-weight:700;font-size:19px;letter-spacing:-.02em}
.iconbtn{width:40px;height:40px;flex:0 0 40px;border-radius:13px;display:grid;place-items:center;background:var(--s2);border:1px solid var(--line)}
.iconbtn:hover{background:var(--s3)}
.searchbar{padding:11px 15px;flex:none}
.searchbar .inp{margin:0;background:var(--s1)}
.body{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:14px}
.view{display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden}
.view.on{display:flex}

.item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:9px 15px}
.item:hover{background:var(--s1)}
.item .t1{font-weight:600;font-size:15px;display:flex;align-items:center;gap:5px;min-width:0}
.item .t2{font-size:13px;color:var(--dim);margin-top:1px}
.time{font-size:11px;color:var(--dim);font-family:"JetBrains Mono",monospace;align-self:flex-start;padding-top:5px}
.cap{padding:16px 15px 7px;font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--dim)}
.blank{padding:54px 32px;text-align:center;color:var(--dim);font-size:14px}
.blank b{display:block;color:var(--tx);font-size:17px;margin-bottom:6px;font-weight:600}

.ava{border-radius:50%;flex:none;overflow:hidden;position:relative;display:grid;place-items:center;font-weight:700;color:#fff;background:var(--s3)}
.ava img{width:100%;height:100%;object-fit:cover}
.ava.friend{box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--b1)}
.ava.grp{border-radius:32%}
.tick{width:15px;height:15px;flex:none}

.tabs{display:flex;flex:none;border-top:1px solid var(--line);background:rgba(20,22,28,.9);padding-bottom:env(safe-area-inset-bottom)}
.tabs button{flex:1;padding:9px 0 10px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--dim);font-size:11px;font-weight:500;position:relative}
.tabs button.on{color:var(--tx)}
.tabs button.on svg{stroke:url(#g1)}
.dot{position:absolute;top:5px;right:calc(50% - 20px);min-width:17px;height:17px;padding:0 4px;border-radius:9px;background:var(--bad);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center}

/* значки */
.badge{width:22px;height:22px;border-radius:6px;flex:none;object-fit:cover;background:var(--s3)}
.badge.sm{width:17px;height:17px;border-radius:5px}
.badgerow{display:flex;flex-wrap:wrap;gap:6px;align-items:center}

#chat{
  position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;
  min-height:0;overflow:hidden;background:var(--bg);
  transform:translateX(100%);transition:transform .24s cubic-bezier(.3,.8,.3,1);
}
#chat.on{transform:none}
@media(min-width:900px){
  #chat{position:relative;inset:auto;transform:none;transition:none;background:transparent}
}
#chatEmpty{flex:1;display:grid;place-items:center;text-align:center;padding:30px;color:var(--dim);font-size:14px}
#chatBox{flex:1;display:flex;flex-direction:column;min-height:0}
.chat-id{cursor:pointer}
.msgs{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 10px}
.day{text-align:center;font-size:11px;color:var(--dim);margin:14px 0 12px;font-family:"JetBrains Mono",monospace}
.who-lbl{font-size:12px;font-weight:600;margin:2px 0 3px 6px;cursor:pointer}
.bub{
  max-width:78%;width:fit-content;padding:9px 13px;border-radius:19px;margin-bottom:7px;
  white-space:pre-wrap;overflow-wrap:anywhere;font-size:15px;animation:pop .18s ease-out;
}
.bub.tight{margin-bottom:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{from{opacity:0;transform:translateY(7px) scale(.98)}to{opacity:1;transform:none}}
.bub.them{background:var(--s2);margin-right:auto;border-bottom-left-radius:7px}
.bub.mine{background:var(--grad);color:#fff;margin-left:auto;border-bottom-right-radius:7px;cursor:pointer}
.bub.pic{padding:5px 5px 6px}
.bub img{border-radius:15px;max-height:340px;object-fit:cover;cursor:zoom-in}
.bub .cap-t{padding:5px 8px 0;white-space:pre-wrap}
.bub .ts{display:block;font-size:10px;opacity:.65;text-align:right;margin-top:3px;font-family:"JetBrains Mono",monospace}
.bub.pic .ts{padding-right:6px}
.st{display:inline-block;vertical-align:-2px;margin-left:5px}
.bub.poll{min-width:230px}
.po{position:relative;display:block;width:100%;text-align:left;margin-top:7px;padding:9px 12px;border:1px solid rgba(255,255,255,.22);border-radius:12px;background:rgba(0,0,0,.14);color:inherit;font-size:14px;overflow:hidden;cursor:pointer}
.bub.them .po{border-color:var(--line);background:var(--s1)}
.po .bar{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.20);z-index:0;transition:width .25s}
.bub.them .po .bar{background:rgba(123,97,255,.25)}
.po .lb{position:relative;z-index:1;display:flex;justify-content:space-between;gap:10px}
.po.sel{border-color:#fff}
.bub.them .po.sel{border-color:var(--b1)}
.pq{font-weight:700;margin-bottom:2px}
.pv{font-size:11px;opacity:.7;margin-top:6px}
.ct-card{display:flex;align-items:center;gap:11px;padding:4px 2px;cursor:pointer;min-width:210px}
.ct-card .t2{font-size:12px;color:inherit;opacity:.75}
.comp{display:flex;align-items:flex-end;gap:8px;flex:none;padding:10px 12px;padding-bottom:calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--line)}
.comp .inp{margin:0;border-radius:22px;flex:1}
.comp textarea{resize:none;max-height:110px;line-height:1.35}
.clip{width:44px;height:44px;flex:none;border-radius:50%;background:var(--s2);border:1px solid var(--line);display:grid;place-items:center}
.clip:hover{background:var(--s3)}
.snd{width:46px;height:46px;flex:none;border-radius:50%;background:var(--grad);display:grid;place-items:center;box-shadow:0 6px 18px -8px rgba(62,168,255,.9)}
.snd:active{transform:scale(.94)}
.snd[disabled]{opacity:.35;box-shadow:none}
.lock{flex:none;padding:14px 16px;padding-bottom:calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--line);text-align:center;font-size:13px;color:var(--dim)}
.lock .ghost{margin-top:10px}

#veil{position:absolute;inset:0;z-index:40;background:rgba(0,0,0,.55);opacity:0;transition:opacity .2s}
#veil.on{opacity:1}
.sheet{
  position:absolute;left:0;right:0;bottom:0;z-index:41;background:var(--s1);
  border:1px solid var(--line);border-bottom:none;border-radius:26px 26px 0 0;
  padding:10px 12px;padding-bottom:calc(14px + env(safe-area-inset-bottom));
  transform:translateY(110%);transition:transform .26s cubic-bezier(.3,.9,.3,1);max-height:80%;overflow-y:auto;
}
@media(min-width:900px){.sheet{left:auto;right:24px;bottom:24px;width:340px;border-radius:22px;border-bottom:1px solid var(--line)}}
.sheet.on{transform:none}
.grab{width:38px;height:4px;border-radius:2px;background:var(--s3);margin:4px auto 12px}
.sheet button{width:100%;text-align:left;padding:14px;border-radius:14px;font-weight:500;display:flex;align-items:center;gap:11px}
.sheet button:hover{background:var(--s2)}

#modal{position:absolute;inset:0;z-index:50;display:none;place-items:center;padding:22px;background:rgba(0,0,0,.6)}
#modal.on{display:grid}
.dlg{width:100%;max-width:410px;max-height:86%;overflow-y:auto;background:var(--s1);border:1px solid var(--line);border-radius:22px;padding:20px}
.dlg h3{font-size:17px;margin-bottom:4px}
.dlg p{font-size:13px;color:var(--dim);margin-bottom:14px}
.dlg .row{display:flex;gap:8px;margin-top:10px}
.dlg .row>*{flex:1;margin-top:0}
.chk{display:flex;align-items:center;gap:10px;padding:9px 2px;width:100%;text-align:left}
.sq{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);flex:none;display:grid;place-items:center}
.sq.on{background:var(--grad);border-color:transparent}
.swatch{width:26px;height:26px;border-radius:8px;flex:none;border:2px solid transparent}
.swatch.on{border-color:#fff}

#toast{
  position:absolute;left:50%;bottom:80px;z-index:60;transform:translate(-50%,20px);
  background:var(--s3);border:1px solid var(--line);border-radius:14px;padding:11px 16px;
  font-size:13px;max-width:88%;text-align:center;opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;
}
#toast.on{opacity:1;transform:translate(-50%,0)}

#light{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.92);display:none;place-items:center;padding:20px;cursor:zoom-out}
#light.on{display:grid}
#light img{max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain}

.card{background:var(--s1);border:1px solid var(--line);border-radius:20px;margin:0 15px 12px;overflow:hidden}
.line{display:flex;align-items:center;gap:11px;padding:13px 15px;border-bottom:1px solid var(--line)}
.line:last-child{border-bottom:none}
.line .k{font-size:13px;color:var(--dim)}
.line .v{font-weight:600}
.pill{padding:7px 13px;border-radius:11px;background:var(--s2);border:1px solid var(--line);font-size:13px;font-weight:600;white-space:nowrap}
.pill.on{background:var(--grad);border-color:transparent;color:#fff}
.pill.red{background:rgba(255,92,108,.14);border-color:transparent;color:var(--bad)}
.pill:hover{opacity:.88}
.avabig{margin:20px auto 12px;position:relative;width:104px}
.avabig .ava{width:104px;height:104px;font-size:40px}
.cam{position:absolute;right:-2px;bottom:-2px;width:34px;height:34px;border-radius:50%;background:var(--grad);display:grid;place-items:center;border:3px solid var(--bg);cursor:pointer}
.who{text-align:center;margin-bottom:18px}
.who .n{font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px}
.who .u{color:var(--dim);font-family:"JetBrains Mono",monospace;font-size:13px;margin-top:2px}
.kbtn{display:block;margin:22px auto 30px;width:34px;height:34px;border-radius:10px;color:#20242E;font-family:Unbounded,sans-serif;font-weight:700;font-size:15px}
.kbtn:hover{color:#2A2F3B}
.rolechip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:8px;font-size:12px;font-weight:600}
.rolechip .dotc{width:8px;height:8px;border-radius:50%}

/* профиль-оверлей */
#sheetProfile{
  position:absolute;left:0;right:0;bottom:0;z-index:43;background:var(--s1);
  border:1px solid var(--line);border-bottom:none;border-radius:26px 26px 0 0;
  transform:translateY(110%);transition:transform .28s cubic-bezier(.3,.9,.3,1);
  max-height:88%;overflow-y:auto;padding-bottom:calc(18px + env(safe-area-inset-bottom));
}
@media(min-width:900px){#sheetProfile{left:auto;right:24px;bottom:24px;width:380px;border-radius:22px;border-bottom:1px solid var(--line)}}
#sheetProfile.on{transform:none}
.pf-banner{height:96px;background:var(--grad);position:relative}
.pf-head{padding:0 18px 14px;margin-top:-42px}
.pf-head .ava{width:84px;height:84px;font-size:32px;border:4px solid var(--s1)}
.pf-name{font-size:21px;font-weight:700;display:flex;align-items:center;gap:6px;margin-top:10px}
.pf-nick{color:var(--dim);font-family:"JetBrains Mono",monospace;font-size:13px}
.pf-sec{padding:12px 18px;border-top:1px solid var(--line)}
.pf-sec .t{font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);margin-bottom:9px}
.pf-badges{display:flex;flex-wrap:wrap;gap:12px}
.pf-badge{display:flex;flex-direction:column;align-items:center;gap:5px;width:58px;text-align:center}
.pf-badge img{width:40px;height:40px;border-radius:11px;object-fit:cover;background:var(--s3)}
.pf-badge span{font-size:10px;color:var(--dim);line-height:1.2}
.pf-act{display:flex;gap:8px;padding:14px 18px;flex-wrap:wrap}
.pf-act button{flex:1;min-width:120px;border-radius:13px;padding:12px;font-weight:600;background:var(--s2);border:1px solid var(--line)}
.pf-act button.prime{background:var(--grad);border-color:transparent;color:#fff}
.pf-act button.red{background:rgba(255,92,108,.14);border-color:transparent;color:var(--bad)}
.pf-act button:hover{opacity:.9}

.banner-warn{
  position:fixed;left:0;right:0;top:0;z-index:120;background:var(--bad);color:#fff;
  text-align:center;padding:calc(9px + env(safe-area-inset-top)) 14px 9px;font-size:13px;font-weight:600;
}

#call,#ring{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;background:#08090C}
#call.on,#ring.on{display:flex}
#vRemote{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#08090C;z-index:0}
#vLocal{
  position:absolute;right:14px;z-index:3;top:calc(90px + env(safe-area-inset-top));
  width:104px;height:142px;object-fit:cover;border-radius:16px;
  border:1px solid rgba(255,255,255,.15);background:#000;
}
.callface{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#08090C}
.callface .nm{font-size:24px;font-weight:700;display:flex;align-items:center;gap:7px}
.calltop{position:relative;z-index:4;text-align:center;padding:24px 20px;padding-top:calc(24px + env(safe-area-inset-top))}
.calltop .nm{font-size:21px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px}
.calltop .st{color:var(--dim);font-size:14px;margin-top:4px;font-family:"JetBrains Mono",monospace}
.callbtns{position:relative;z-index:4;margin-top:auto;display:flex;justify-content:center;gap:20px;padding:26px 20px;padding-bottom:calc(30px + env(safe-area-inset-bottom))}
.cbtn{width:62px;height:62px;border-radius:50%;display:grid;place-items:center;flex:none;background:rgba(255,255,255,.13);backdrop-filter:blur(8px);transition:transform .12s}
.cbtn:active{transform:scale(.92)}
.cbtn.red{background:#F03E52;box-shadow:0 8px 26px -10px #F03E52}
.cbtn.green{background:#2ECC71;box-shadow:0 8px 26px -10px #2ECC71}
.cbtn.mut{background:#EDEFF4}
.cbtn.mut svg{stroke:#14161C}
.ringpulse{animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@media(prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute"><defs>
  <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#7B61FF"/><stop offset="1" stop-color="#3EA8FF"/>
  </linearGradient>
</defs></svg>

<div class="frame">

  <!-- ======== ЗАСТАВКА ======== -->
  <section id="splash" style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px">
    <div class="logo">Kwora</div>
    <div style="width:26px;height:26px;border:3px solid #2E3340;border-top-color:#7B61FF;border-radius:50%;animation:spin 0.8s linear infinite"></div>
  </section>

  <!-- ======== ВХОД ======== -->
  <section id="auth" class="hide">
    <div class="logo">Kwora</div>
    <div class="pane">

function shrink(file, side, budget){
  const MIME_OK = /^image\/(jpeg|png|webp|gif|bmp)/i;

  const finish = (cv, res, rej) => {
    // проверка: не сплошной ли чёрный/пустой кадр получился
    try {
      const ctx = cv.getContext("2d");
      const probe = ctx.getImageData(0, 0, Math.min(cv.width, 32), Math.min(cv.height, 32)).data;
      let bright = 0;
      for (let i = 0; i < probe.length; i += 4) {
        if (probe[i] > 16 || probe[i+1] > 16 || probe[i+2] > 16) { bright++; if (bright > 4) break; }
      }
      if (bright <= 4) { rej(new Error("black")); return; }
    } catch (_) {}
    let q = 0.8, out = cv.toDataURL("image/jpeg", q);
    while (out.length > budget && q > 0.28) { q -= 0.1; out = cv.toDataURL("image/jpeg", q); }
    if (!out || out.length < 200) { rej(new Error("encode")); return; }
    res(out);
  };

  const drawToCanvas = (srcW, srcH, drawFn) => {
    const k = Math.min(1, side / Math.max(srcW, srcH));
    const w = Math.max(1, Math.round(srcW * k)), h = Math.max(1, Math.round(srcH * k));
    const cv = document.createElement("canvas");
    cv.width = w; cv.height = h;
    const ctx = cv.getContext("2d");
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, w, h);
    drawFn(ctx, w, h);
    return cv;
  };

  return new Promise(async (res, rej) => {
    // путь 1: createImageBitmap — современный декодер, лучше работает в WebView
    if (window.createImageBitmap) {
      try {
        const bmp = await createImageBitmap(file);
        if (bmp && bmp.width && bmp.height) {
          const cv = drawToCanvas(bmp.width, bmp.height, (ctx, w, h) => ctx.drawImage(bmp, 0, 0, w, h));
          try { bmp.close && bmp.close(); } catch (_) {}
          let ok = false;
          finish(cv, out => { ok = true; res(out); }, () => {});
          if (ok) return; // получилось — выходим; чёрный кадр — идём на путь 2
        }
      } catch (_) { /* падаем на путь 2 */ }
    }
    fallbackImage();

    // путь 2: классический Image
    function fallbackImage(){
      const r = new FileReader();
      r.onerror = () => rej(new Error("Файл не читается"));
      r.onload = () => {
        const img = new Image();
        const draw = () => {
          const w0 = img.naturalWidth || img.width, h0 = img.naturalHeight || img.height;
          if (!w0 || !h0) { rej(new Error("Формат не поддерживается. Попробуйте JPG или PNG.")); return; }
          const cv = drawToCanvas(w0, h0, (ctx, w, h) => ctx.drawImage(img, 0, 0, w, h));
          finish(cv, res, () => rej(new Error("Формат не поддерживается. Попробуйте JPG, PNG или скриншот.")));
        };
        img.onerror = () => rej(new Error("Формат не поддерживается. Попробуйте JPG или PNG."));
        img.onload = () => { if (img.decode) img.decode().then(draw).catch(draw); else draw(); };
        img.src = r.result;
      };
      r.readAsDataURL(file);
    }
  });
}

async function fgDo(a, btn){
  if (btn) btn.disabled = true;
  $("forgot").classList.add("hide");

  const slow = setTimeout(() => {
    $("splash").classList.add("hide");

    if (btn) btn.disabled = false;
  }, 15000);
  try {
    const r = await callMailConfirm({ mail: FG.mail, code: FG.code, action: "login", uid: a.uid });
    clearTimeout(slow);
    const token = r.data && r.data.token;
    if (!token) throw new Error("Токен не получен");
    await signInWithCustomToken(auth, token);
  } catch (e) {
    clearTimeout(slow);
    $("splash").classList.add("hide");
    $("forgot").classList.remove("hide");
    const eb = $("fgErr"); if (eb) eb.textContent = fbErr(e);
    else toast(fbErr(e));

  }

onAuthStateChanged(auth, async u => {
  if (window.__mark) __mark("вход:" + (u ? "есть-сессия" : "нет-сессии"));
  if (busy) return;
  $("splash").classList.add("hide");
  if (!u) { stopAll(); return; }
  try {
    const s = await getDoc(U(u.uid));
    if (!s.exists()) { await signOut(auth); $("note").textContent = "Профиль не найден."; return; }
    if (s.data().banned) { await signOut(auth); $("note").textContent = "Этот аккаунт заблокирован."; return; }
    start(s.data());
  } catch (e) { stopAll(); }
});

function stopAll(){
  endCall(false); closeIncoming(); closeProfile();
  subs.forEach(f => f()); subs = [];
  if (subMsgs) subMsgs(); subMsgs = null;
  if (subRoles) subRoles(); subRoles = null;
  me = null; active = null; chats = []; reqs = []; invites = []; badgeCat = [];
  friends = new Set(); blocks = new Set(); cache = new Map();
  isAdmin = false; kTaps = 0;

  $("chat").classList.remove("on");
  $("app").classList.add("hide");
  $("splash").classList.add("hide");
  $("forgot").classList.add("hide");
  $("auth").classList.remove("hide");
  $("go").disabled = false;
}

async function start(p){
  if (window.__mark) __mark("старт-профиля");
  me = p; cache.set(me.uid, me);
  $("auth").classList.add("hide"); $("splash").classList.add("hide"); $("app").classList.remove("hide"); $("go").disabled = false;

  try { isAdmin = (await getDoc(doc(db, "admins", me.uid))).exists(); } catch (_) { isAdmin = false; }

  subs.push(onSnapshot(U(me.uid), s => {
    if (!s.exists()) { toast("Аккаунт удалён"); stopAll(); signOut(auth); return; }
    me = s.data(); cache.set(me.uid, me);
    if (me.banned) { toast("Аккаунт заблокирован"); stopAll(); signOut(auth); return; }
    syncBotsTab();
    if (tab === "me") drawMe();
  }));

  subs.push(onSnapshot(collection(db, "badges"), s => {
    badgeCat = s.docs.map(d => ({ id: d.id, ...d.data() }));
    if (tab === "chats") drawChats();
  }));

  subs.push(onSnapshot(collection(db, "users", me.uid, "friends"), s => {
    friends = new Set(s.docs.map(d => d.id));
    if (tab === "chats") drawChats();
    if (tab === "people") drawPeople();
  }));
  subs.push(onSnapshot(collection(db, "users", me.uid, "blocked"), s => {
    blocks = new Set(s.docs.map(d => d.id));
    if (tab === "chats") drawChats();
    if (tab === "people") drawPeople();
  }));
  subs.push(onSnapshot(collection(db, "users", me.uid, "requests"), async s => {
    reqs = s.docs.map(d => ({ uid: d.id, ...d.data() }));
    await Promise.all(reqs.map(r => profile(r.uid)));
    badgeCount(); if (tab === "people") drawPeople();
  }));
  subs.push(onSnapshot(collection(db, "users", me.uid, "invites"), s => {
    invites = s.docs.map(d => ({ id: d.id, ...d.data() }));
    badgeCount(); if (tab === "people") drawPeople();
  }));
  subs.push(onSnapshot(query(collection(db, "chats"), where("members", "array-contains", me.uid)), async s => {
    chats = s.docs.map(d => ({ id: d.id, ...d.data() }));
    chats.sort((a, b) => msOf(b.lastAt) - msOf(a.lastAt));
    await Promise.all(chats.filter(c => c.type !== "group").map(c => profile(peerOf(c))));
    if (active) { const cur = chats.find(c => c.id === active.id); if (cur) { active.chat = cur; head(); gate(); if (lastMsgs.length) drawMsgs(lastMsgs); } }
    if (!$("iFind").value.trim() && tab === "chats") drawChats();
  }));

  subs.push(onSnapshot(query(collection(db, "calls"), where("to", "==", me.uid)), s => {
    s.docChanges().forEach(ch => {
      const id = ch.doc.id, d = ch.doc.data();
      if (ch.type === "removed") { if (incoming && incoming.id === id) closeIncoming(); return; }
      if (incoming && incoming.id === id) incoming.d = d;
      if (d.state !== "ringing") { if (incoming && incoming.id === id) closeIncoming(); return; }
      if (call || incoming) return;
      const t = msOf(d.at) || Date.now();
      if (Date.now() - t > 60000) return;
      showIncoming(id, d);
    });
  }, e => toast("Звонки: " + say(e))));

  syncBotsTab();
  if (me.lang) { applyLang(me.lang, true); go("chats"); }
  else {
    langPickScreen(() => { $("app").classList.remove("hide"); go("chats"); });
  }
}

function badgeCount(){

}

const dmId = (a, b) => [a, b].sort().join("__");

async function openDM(p){
  cache.set(p.uid, p);
  const id = dmId(me.uid, p.uid);
  const ex = chats.find(c => c.id === id);
  active = { id, chat: ex || { id, type: "dm", members: [me.uid, p.uid].sort() } };
  activeRoles = [];
  paint();
  try {
    await setDoc(C(id), {
      type: "dm", members: [me.uid, p.uid].sort(),
      info: { [me.uid]: { nick: me.nick, name: me.name || me.nick }, [p.uid]: { nick: p.nick, name: p.name || p.nick } }
    }, { merge: true });
  } catch (e) { toast(say(e)); return; }
  listen(id);
}
async function openChat(c){
  active = { id: c.id, chat: c }; activeRoles = [];
  if (c.type !== "group") await profile(peerOf(c));
  else await Promise.all((c.members || []).map(profile));
  paint();
  listen(c.id);
  if (c.type === "group") watchRoles(c.id);
}
function paint(){
  $("chatEmpty").classList.add("hide");
  $("chatBox").classList.remove("hide");
  $("chat").classList.add("on");
  $("msgs").replaceChildren();

}
function head(){
  if (!active) return;
  const c = active.chat, f = face(c);
  $("peerAva").replaceChildren(ava(f, 40));
  const n = $("peerName");
  n.replaceChildren(el("span", "ell", f.name || f.nick));

  n.append(miniBadges(f.badges, true));
  $("peerSub").textContent = c.type === "group" ? (c.members || []).length + T("members") : "@" + (f.nick || "");
  const grp = c.type === "group";
  $("callA").classList.toggle("hide", grp);
  $("callV").classList.toggle("hide", grp);
}
$("peerHead").onclick = $("peerAva").onclick = () => {
  if (!active) return;

  else openProfile(peerOf(active.chat));

function watchRoles(id){
  if (subRoles) subRoles();
  subRoles = onSnapshot(collection(db, "chats", id, "roles"), s => {
    activeRoles = s.docs.map(d => ({ id: d.id, ...d.data() }));
    activeRoles.sort((a, b) => (a.order || 0) - (b.order || 0));
  }, () => {});
}

function myPerms(){
  const c = active && active.chat;
  if (!c || c.type !== "group") return {};
  if (c.owner === me.uid) return { owner: true, del: 1, kick: 1, invite: 1, edit: 1, roles: 1 };
  const rid = (c.memberRoles || {})[me.uid];
  const r = activeRoles.find(x => x.id === rid);
  return r ? (r.perms || {}) : {};
}

let lastMsgs = [], lastReadMark = 0;
function markRead(list){
  if (!active) return;
  const foreign = list.filter(m => m.from !== me.uid && m.at);
  if (!foreign.length) return;
  const lastAt = msOf(foreign[foreign.length - 1].at);
  const myMark = msOf(((active.chat.reads || {})[me.uid]) || 0);
  if (lastAt <= myMark || Date.now() - lastReadMark < 1500) return;
  lastReadMark = Date.now();
  updateDoc(C(active.id), { ["reads." + me.uid]: serverTimestamp() }).catch(() => {});
}
function listen(id){
  if (subMsgs) subMsgs();
  subMsgs = onSnapshot(
    query(collection(db, "chats", id, "messages"), orderBy("at", "asc"), limit(300)),
    { includeMetadataChanges: true },
    s => {
      lastMsgs = s.docs.map(d => ({ id: d.id, ...d.data(), _pending: d.metadata.hasPendingWrites }));
      drawMsgs(lastMsgs);
      markRead(lastMsgs);
    },
    e => toast(say(e))
  );
}
function closeChat(){
  $("chat").classList.remove("on");
  $("chatBox").classList.add("hide");
  $("chatEmpty").classList.remove("hide");
  if (subMsgs) subMsgs(); subMsgs = null;
  if (subRoles) subRoles(); subRoles = null;
  active = null; activeRoles = [];
}
$("back").onclick = closeChat;

function gate(){
  if (!active) return;
  const c = active.chat, comp = $("comp"), lock = $("lock");
  lock.replaceChildren();
  if (c.type === "group") { comp.classList.remove("hide"); lock.classList.add("hide"); return; }
  const p = cache.get(peerOf(c)) || {};
  if (blocks.has(p.uid)) {
    comp.classList.add("hide"); lock.classList.remove("hide");
    lock.append(document.createTextNode(T("lockBlocked") + p.nick));
    const b = el("button", "ghost", T("unblock"));
    b.onclick = () => deleteDoc(doc(db, "users", me.uid, "blocked", p.uid)).then(gate);
    lock.append(b); return;
  }
  if (p.whoCanWrite === "friends" && !friends.has(p.uid)) {
    comp.classList.add("hide"); lock.classList.remove("hide");
    lock.append(document.createTextNode("@" + p.nick + T("lockFriends")));
    const b = el("button", "ghost", T("sendReq")); b.onclick = () => askFriend(p);
    lock.append(b); return;
  }
  comp.classList.remove("hide"); lock.classList.add("hide");
}

function drawMsgs(list){
  const box = $("msgs"); box.replaceChildren();
  const grp = active && active.chat.type === "group";
  let day = null, prev = null;
  for (const m of list) {
    const d = toDate(m.at) ? toDate(m.at).toDateString() : null;
    if (d && d !== day) { day = d; box.append(el("div", "day", dayName(m.at))); }
    const mine = m.from === me.uid;
    if (grp && !mine && (!prev || prev.from !== m.from)) {
      const p = cache.get(m.from) || { uid: m.from, nick: "…" };
      const rid = (active.chat.memberRoles || {})[m.from];
      const role = activeRoles.find(x => x.id === rid);
      const lbl = el("div", "who-lbl", p.name || p.nick);
      lbl.style.color = (role && role.color) ? role.color : "var(--b2)";
      lbl.onclick = () => openProfile(m.from);
      box.append(lbl);
    }
    const b = el("div", "bub " + (mine ? "mine" : "them") + (prev && prev.from === m.from ? " tight" : "") + (m.img ? " pic" : "") + (m.poll ? " poll" : ""));
    if (m.img) {
      const im = document.createElement("img"); im.src = m.img; im.alt = "";
      im.onclick = ev => { ev.stopPropagation(); $("lightImg").src = m.img; $("light").classList.add("on"); };
      b.append(im);
      if (m.text) b.append(el("div", "cap-t", m.text));
    } else if (m.poll) {
      b.append(el("div", "pq", m.poll.q));
      const votes = m.votes || {};
      const total = Object.keys(votes).length;
      const myVote = votes[me.uid];
      m.poll.opts.forEach((opt, idx) => {
        const cnt = Object.values(votes).filter(v => v === idx).length;
        const pct = total ? Math.round(cnt * 100 / total) : 0;
        const po = el("button", "po" + (myVote === idx ? " sel" : ""));
        const bar = el("div", "bar"); bar.style.width = (total ? pct : 0) + "%"; po.append(bar);
        const lb = el("div", "lb");
        lb.append(el("span", null, (myVote === idx ? "✓ " : "") + opt));
        lb.append(el("span", null, total ? pct + "%" : ""));
        po.append(lb);
        po.onclick = async ev => {
          ev.stopPropagation();
          try { await updateDoc(doc(db, "chats", active.id, "messages", m.id), { ["votes." + me.uid]: idx }); }
          catch (e) { toast(say(e)); }
        };
        b.append(po);
      });
      b.append(el("div", "pv", total + " " + T("votes")));
    } else if (m.contact) {
      const cc = el("div", "ct-card");
      cc.append(ava(m.contact, 44));
      const mm = el("div", "grow");
      mm.append(el("div", "t1 ell", m.contact.name));
      mm.append(el("div", "t2 mono ell", "@" + m.contact.nick));
      cc.append(mm);
      cc.onclick = ev => { ev.stopPropagation(); openProfile(m.contact.uid); };
      b.append(cc);
    } else if (m.text) b.append(document.createTextNode(m.text));
    const ts = el("span", "ts", hhmm(m.at));
    if (mine) {
      const st = el("span", "st");
      if (m._pending || !m.at) {
        st.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
      } else {
        const reads = (active && active.chat.reads) || {};
        const myAt = msOf(m.at);
        const seen = (active.chat.members || []).some(u => u !== me.uid && reads[u] && msOf(reads[u]) >= myAt);
        st.innerHTML = seen
          ? '<svg width="17" height="12" viewBox="0 0 28 18" fill="none" stroke="#7FDBFF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10l4.5 4.5L15 6"/><path d="M11 10l4.5 4.5L24 6"/></svg>'
          : '<svg width="13" height="12" viewBox="0 0 20 18" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10l4.5 4.5L16 6"/></svg>';
      }
      ts.append(st);
    }
    b.append(ts);
    const canDel = mine || (grp && (myPerms().del || active.chat.owner === me.uid));
    if (canDel) b.onclick = () => msgMenu(m, mine);
    box.append(b);
    prev = m;
  }
  box.scrollTop = box.scrollHeight;
}
